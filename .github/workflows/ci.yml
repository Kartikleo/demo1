name: DEMO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  demo-job:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Print message
        run: echo "Hello from GitHub Actions!"

      - name: Step 2 - Show current directory
        run: pwd

      - name: Step 3 - List files
        run: ls -la